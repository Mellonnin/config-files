#see https://wiki.hyprland.org/Configuring/Binds/ for more
bind = $mainMod, RETURN, exec, kitty
bind = $mainMod, A, killactive, 
bind = $mainMod, D , fullscreen, 0
bind = $mainMod, F, exec, wofi --show drun
bind = $mainMod, G, exec, hyprlock  # Lock scren
bind = $mainMod, F7, exec, hyprshot -m window # Screenshot a window

# Move focus 
bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d

# Move active window in the workspace
bind = $mainMod SHIFT, H, movewindow, l
bind = $mainMod SHIFT, L, movewindow, r
bind = $mainMod SHIFT, K, movewindow, u
bind = $mainMod SHIFT, J, movewindow, d


# resize window in the workspace
binde = $mainMod CTRL, L, resizeactive, 10 0
binde = $mainMod CTRL, H, resizeactive, -10 0
binde = $mainMod CTRL, K, resizeactive, 0 -10
binde = $mainMod CTRL, J, resizeactive, 0 10

# Switch workspaces 
bind = $mainMod, R, workspace, 1
bind = $mainMod, U, workspace, 2
bind = $mainMod, E, workspace, 3
bind = $mainMod, I, workspace, 4
bind = $mainMod, W, workspace, 5
bind = $mainMod, O, workspace, 6
bind = $mainMod, Q, workspace, 7
bind = $mainMod, P, workspace, 8
bind = $mainMod, T, workspace, 9
bind = $mainMod, Y, workspace, 10


# # Move active window to a workspace
# bind = $mainMod SHIFT, R, movetoworkspace, 1
# bind = $mainMod SHIFT, U, movetoworkspace, 2
# bind = $mainMod SHIFT, E, movetoworkspace, 3
# bind = $mainMod SHIFT, I, movetoworkspace, 4
# bind = $mainMod SHIFT, W, movetoworkspace, 5
# bind = $mainMod SHIFT, O, movetoworkspace, 6
# bind = $mainMod SHIFT, Q, movetoworkspace, 7
# bind = $mainMod SHIFT, P, movetoworkspace, 8
# bind = $mainMod SHIFT, T, movetoworkspace, 9
# bind = $mainMod SHIFT, Y, movetoworkspace, 10

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

#hyprshot
bind = SHIFT,XF86Display,exec, hyprshot -m output --silent # Screenshot a monitor
bind = $mainMod,XF86Display,exec, hyprshot -m window --silent # Screenshot a monitor
bind = , XF86Display, exec, hyprshot -m region --silent # Screenshot a region

# Brightness
bind=,XF86MonBrightnessUp,exec,hyprctl hyprsunset gamma +10
bind=,XF86MonBrightnessDown,exec,hyprctl hyprsunset gamma -10

# Speaker volume
bind=,XF86AudioRaiseVolume,exec, pamixer -i 5
bind=,XF86AudioLowerVolume,exec, pamixer -d 5
bind=,XF86AudioMute,exec, pamixer --toggle-mute
bind=,XF86AudioMicMute,exec, pamixer --default-source -t
bind=SHIFT,XF86AudioRaiseVolume,exec, pamixer --default-source -i 5
bind=SHIFT,XF86AudioLowerVolume,exec, pamixer --default-source -d 5

# media controls using keyboards
bind = ,XF86NotificationCenter, exec, playerctl play-pause
bind = ,XF86PickupPhone, exec, playerctl previous
bind = ,XF86HangupPhone, exec, playerctl next
bind = ,XF86Favorites, exec, playerctl stop
